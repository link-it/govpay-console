<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>GovPay Console</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Console di backoffice GovPay — gestione pagamenti, riscossioni, anagrafiche.">
  <link rel="icon" type="image/x-icon" href="govpay.png">

  <!--
    Loading splash mostrato PRIMA del bootstrap di Angular (e quindi prima
    che `theme.json` venga caricato dal `ConfigService`). I colori sono
    quindi necessariamente hardcoded; per personalizzarli per tenant
    sovrascrivi le CSS variables `--app-loading-*` nel blocco `:root` qui
    sotto. Default: brand GovPay (coral su fondo accent-light).
  -->
  <style>
    :root {
      --app-loading-bg-from: #f4f8fa;
      --app-loading-bg-to: #cce3ed;
      --app-loading-spinner: #ff4050;
      --app-loading-spinner-track: rgba(33, 51, 73, 0.12);
      --app-loading-text: #213349;
    }

    .app-loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(
        135deg,
        var(--app-loading-bg-from) 0%,
        var(--app-loading-bg-to) 100%
      );
      z-index: 9999;
    }

    .app-loading-logo {
      margin-bottom: 24px;
    }

    .app-loading-logo img {
      width: 200px;
      height: auto;
    }

    .app-loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--app-loading-spinner-track);
      border-top-color: var(--app-loading-spinner);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .app-loading-text {
      margin-top: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 14px;
      color: var(--app-loading-text);
      letter-spacing: 0.5px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Hide loading when app is ready */
    app-root:not(:empty) + .app-loading,
    app-root:not(:empty) ~ .app-loading {
      display: none;
    }
  </style>

</head>
<body class="bg-[var(--background)] text-[var(--foreground)] antialiased">
  <app-root></app-root>

  <!-- Loading indicator -->
  <div class="app-loading">
    <div class="app-loading-logo">
      <img src="assets/images/logo/LINK_logo-Govpay.svg" alt="GovPay">
    </div>
    <div class="app-loading-spinner"></div>
  </div>
</body>
</html>
