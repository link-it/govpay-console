<a
  href="#main-content"
  class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:z-50 focus:px-4 focus:py-2 focus:bg-[var(--primary)] focus:text-[var(--primary-foreground)] focus:rounded"
>
  {{ 'Layout.SkipToContent' | translate }}
</a>

<div class="min-h-screen bg-[var(--background)] text-[var(--foreground)]">
  <div class="hidden lg:block">
    <lnk-sidebar />
  </div>

  <div
    class="flex flex-col min-h-screen transition-all duration-150"
    [class.lg:pl-16]="collapsed()"
    [class.lg:pl-64]="!collapsed()"
  >
    <lnk-header-bar />

    <main id="main-content" class="flex-1 min-w-0 pb-16 lg:pb-0">
      <lnk-snackbar />
      <router-outlet />
    </main>
  </div>

  <lnk-sidebar-mobile />
  <lnk-mobile-bottom-nav />
  <lnk-help-sidebar />
  <lnk-spinner />
  @if (showGotoTop()) {
    <lnk-goto-top />
  }
  <lnk-global-tweaks-host />
</div>
