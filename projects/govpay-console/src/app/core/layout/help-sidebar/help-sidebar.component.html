@if (open()) {
  <div class="fixed inset-0 z-40 flex justify-end" role="dialog" aria-modal="true" [attr.aria-label]="title()">
    <button
      type="button"
      class="absolute inset-0 bg-black/40"
      (click)="close()"
      [attr.aria-label]="'Help.Close' | translate"
    ></button>

    <aside
      class="relative flex flex-col w-full sm:w-96 max-w-full bg-[var(--card-bg)] text-[var(--foreground)] shadow-xl"
    >
      <div class="flex h-[var(--header-height)] items-center gap-2 px-4 border-b border-[var(--card-border)]">
        <h2 class="font-semibold truncate">{{ title() }}</h2>
        <button
          type="button"
          class="ml-auto p-2 rounded hover:bg-[var(--muted)]"
          (click)="close()"
          [attr.aria-label]="'Common.Close' | translate"
        >
          <ng-icon name="bootstrapXLg" size="1.25rem" />
        </button>
      </div>

      <div class="flex-1 overflow-y-auto p-4 text-sm scrollbar-thin space-y-3">
        @if (ctx()?.section; as section) {
          <p class="text-xs uppercase tracking-wide opacity-60">
            {{ 'Help.Section' | translate: { section: section } }}
          </p>
        }
        <p class="opacity-80">{{ 'Help.ContextNotAvailable' | translate }}</p>
      </div>
    </aside>
  </div>
}
