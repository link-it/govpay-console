<section class="space-y-4 pb-6 lnk-detail-page">
  <div lnkListStickyToolbar class="px-6 pt-6 pb-4 space-y-3">
    <lnk-page-header [titleKey]="tracciato()?.nomeFile || '—'" subtitleKey="Tracciati.Detail.Subtitle">
      <a routerLink="/tracciati" class="btn btn-secondary btn-sm">
        <ng-icon name="bootstrapChevronLeft" size="1rem" />
        <span>{{ 'Common.Back' | translate }}</span>
      </a>
    </lnk-page-header>
    @if (tracciato()) {
      <div class="flex items-center gap-2">
        <lnk-status-badge [tone]="statoTone()" [labelKey]="statoLabelKey()" />
      </div>
    }
  </div>

  <div class="px-6 space-y-4">

  @if (error()) {
    <lnk-empty-state
      icon="bootstrapExclamationTriangle"
      titleKey="Common.LoadError"
      [descriptionKey]="error()!"
    >
      <a routerLink="/tracciati" class="btn btn-secondary btn-sm">{{ 'Common.Back' | translate }}</a>
    </lnk-empty-state>
  } @else if (loading() && !tracciato()) {
    <lnk-loading />
  } @else if (tracciato()) {
    <lnk-detail-section titleKey="Tracciati.Detail.Generali">
      <lnk-info-grid [items]="generaliItems()" />
    </lnk-detail-section>

    <lnk-detail-section titleKey="Tracciati.Detail.EnteCreditore">
      <lnk-info-grid [items]="enteItems()" />
    </lnk-detail-section>

    <lnk-detail-section titleKey="Tracciati.Detail.Contatori">
      <lnk-info-grid [items]="contatoriItems()" />
    </lnk-detail-section>
  }
  </div>
</section>
