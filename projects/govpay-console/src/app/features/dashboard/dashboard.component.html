<section class="p-6 space-y-4">
  <div>
    <h2 class="text-2xl font-semibold">{{ 'Dashboard.Title' | translate }}</h2>
    <p class="text-[var(--muted-foreground)]">{{ 'Dashboard.Welcome' | translate }}</p>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    @for (card of cards(); track card.titleKey) {
      <button
        type="button"
        class="text-left rounded border border-[var(--card-border)] bg-[var(--card-bg)] p-4 shadow-[var(--card-shadow)] hover:bg-[var(--muted)] transition-colors"
        (click)="goTo(card)"
      >
        <div class="flex items-start justify-between">
          <h3 class="text-sm font-medium opacity-70">{{ card.titleKey | translate }}</h3>
          <ng-icon [name]="card.icon" size="1.25rem" class="opacity-50" />
        </div>
        @if (card.loading) {
          <p class="text-2xl font-semibold mt-1 text-[var(--muted-foreground)]">…</p>
        } @else if (card.error) {
          <p class="text-2xl font-semibold mt-1 text-[var(--danger,#ef4444)]">—</p>
        } @else {
          <p class="text-2xl font-semibold mt-1">{{ card.value }}</p>
        }
        <p class="text-xs opacity-60 mt-2">{{ card.hintKey | translate }}</p>
      </button>
    }
  </div>
</section>
